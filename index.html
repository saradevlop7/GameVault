<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - Vente de Jeux Vidéo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">GameVault</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="text-center mb-4">Catalogue de Jeux</h1>

        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="search-input" class="form-control" placeholder="Rechercher par titre...">
            </div>
        </div>

        <div class="row mb-4">
            <div class="col">
                <button class="btn btn-outline-primary me-2 category-btn" data-genre="all">Tous</button>
                <button class="btn btn-outline-primary me-2 category-btn" data-genre="Action">Action</button>
                <button class="btn btn-outline-primary me-2 category-btn" data-genre="RPG">RPG</button>
                <button class="btn btn-outline-primary me-2 category-btn" data-genre="FPS">FPS</button>
            </div>
        </div>

        <div id="games-container" class="row"></div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
